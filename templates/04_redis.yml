# Service Redis
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: mist-insight
  labels:
    app: redis
spec:
  type: ClusterIP # LoadBalancer
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    app: redis
---
# ConfigMap Redis
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: mist-insight
  labels:
    app: redis
data:
  redis-config: |
    # listen port
    bind 0.0.0.0
    port 6379
---
# Deployment Redis
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: mist-insight
  labels:
    app: redis
spec:
  replicas: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      volumes:
        - name: redis
          persistentVolumeClaim:
            claimName: redis-pvc
      initContainers:
        - name: init
          image: busybox
          command:
            - /bin/sh
            - '-c'
            - |
              chown -R 1000 /data
          resources: {}
          volumeMounts:
            - name: redis
              mountPath: /data
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
      containers:
        - name:  redis
          image: redis:8.6.1
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: redis-secret
          volumeMounts:
            - name: redis
              mountPath: /data
          ports:
            - containerPort: 6379
              protocol: TCP
          resources:
            limits:
              memory: 512M
              cpu: "0.5"
            requests:
              memory: 512M
              cpu: "0.5"
