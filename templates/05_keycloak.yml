# Сервис Keycloak
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: mist-insight
  labels:
    app: keycloak
spec:
  type: ClusterIP
  selector:
    app: keycloak
  ports:
    - protocol: TCP
      port: 8443
      targetPort: 8443
---
# Deployment Keycloak
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: mist-insight
  labels:
    app: keycloak
spec:
  replicas: 2
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      volumes:
        - name: tls-volume
          secret:
            secretName: tls-secret
        - name: secret-volume
          secret:
            secretName: jks-secret
        - name: new-cacerts
          emptyDir: { }
        - name: spi-volume
          secret:
            secretName: keycloak-spi-secret
      initContainers:
        - name: init-keycloak
          image: {{ .Values.MIST_REGISTRY }}/{{ .Values.KEYCLOAK_VERSION }}
          command: [ "/bin/sh", "-c" ]
          args:
            - |
              # Copy original cacerts and import the custom CA
              cp /etc/pki/java/cacerts /opt/new-cacerts/
              chmod +w /opt/new-cacerts/cacerts
              keytool -import -trustcacerts -alias mist-ca -no-prompt -keystore /opt/new-cacerts/cacerts -storepass changeit -file /etc/secret/ca.pem
          volumeMounts:
            - name: secret-volume
              mountPath: /etc/secret
              readOnly: true
            - name: new-cacerts
              mountPath: /opt/new-cacerts
      containers:
        - name: keycloak
          image: {{ .Values.MIST_REGISTRY }}/{{ .Values.KEYCLOAK_VERSION }}
          args: [
            "start",
            "--import-realm",
            "--https-certificate-file=/etc/tls/tls.crt",
            "--https-certificate-key-file=/etc/tls/tls.key",
            "--https-protocols=TLSv1.3,TLSv1.2",
            "--hostname-strict=false" #,
          ]
          imagePullPolicy: Always
          volumeMounts:
            - name: tls-volume
              mountPath: /etc/tls
            - name: secret-volume
              mountPath: /etc/secret
            - name: new-cacerts
              mountPath: /etc/pki/java/cacerts
              subPath: cacerts
            - name: spi-volume
              mountPath: /opt/keycloak/providers/spi.properties
              subPath: spi.properties
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: KEYCLOAK_ADMIN
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KC_PROXY
              value: "edge"
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_METRICS_ENABLED
              value: "true"
            - name: KC_LOG_LEVEL
              value: INFO
            - name: KC_DB
              value: postgres
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: keycloak-postgres-secret
                  key: POSTGRES_DB
            - name: KC_DB_URL
              value: jdbc:postgresql://external-postgres/$(POSTGRES_DB)
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-postgres-secret
                  key: POSTGRES_USER
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-postgres-secret
                  key: POSTGRES_PASSWORD
          ports:
            - name: https
              containerPort: 8443
          #          readinessProbe:
          #            httpGet:
          #              path: /health/ready
          #              port: 8080
          #            initialDelaySeconds: 250
          #            periodSeconds: 10
          #          livenessProbe:
          #            httpGet:
          #              path: /health/live
          #              port: 8080
          #            initialDelaySeconds: 500
          #            periodSeconds: 30
          resources:
            limits:
              memory: 1024M
              cpu: "0.5"
            requests:
              memory: 1024M
              cpu: "0.5"
      imagePullSecrets:
        - name: registry-secret
